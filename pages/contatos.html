<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <style>
        /* Header */
        header {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: black;
            color: white;

            nav {
                a {
                    text-decoration: none;
                }

                button {
                    font-family: "Noto Sans", sans-serif;
                    margin-left: 10px;
                    padding: 10px;
                    border: none;
                    background: white;
                    color: black;
                    cursor: pointer;
                    transition: background 0.3s ease;

                    &:hover {
                        background: #f0f0f0;
                        border-radius: 10px;
                    }
                }
            }
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: grid;
            justify-content: center;
            align-items: center;
            height: 60vh;
            background-color: #000000;
        }

        .container {
            display: grid;
            grid-template-rows: 1fr 2fr;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        .info {
            display: block;
            flex-direction: column;
            gap: 10px;
        }

        .info h2 {
            margin: 0;
        }

        .social {
            display: flex;
            gap: 10px;
        }

        .social a {
            text-decoration: none;
            color: white;
            background: #333;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .formulario input,
        .formulario textarea {
            width: 95%;
            height: 13%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .formulario button {
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<!-- Header -->
<header>
    <div class="logo">
        <img src="../images/auralogop.svg" width="100px">
    </div>
    <nav>
        <a href="#projetos"><button>Projetos</button></a>
        <a href="#projetos"><button>Bio</button></a>
        <a href="#contato"><button>Contato</button></a>
    </nav>
</header>



<body>
    <div class="container">
        <div class="info">
            <h2>Entre em contato</h2>
            <p>Me envie uma mensagem ou me siga nas redes sociais.</p>
            <div class="social">
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
            </div>
        </div>
        <div class="formulario">
            <input type="text" placeholder="Seu nome">
            <input type="email" placeholder="Seu e-mail">
            <textarea placeholder="Sua mensagem"></textarea>
            <button>Enviar</button>
        </div>
    </div>
</body>

</html>
