<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Estúdio | Daniel Rosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans", sans-serif;
      background-color: black;
      color: white;
    }

    header {
      background: black;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .logo img {
      width: 100px;
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 40px;
      height: 30px;
      cursor: pointer;
      z-index: 1001;
    }

    .menu-toggle span {
      width: 100%;
      height: 3px;
      background-color: white;
      margin: 4px 0;
      transition: all 0.3s ease;
    }

    /* Animação do ícone ao abrir */
    .menu-toggle.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      text-decoration: none;
      color: white;
      border: 2px solid white;
      padding: 10px 18px;
      border-radius: 25px;
      transition: 0.3s;
    }

    nav a:hover {
      background: white;
      color: black;
    }

    /* Menu mobile (escondido por padrão) */
    @media (max-width: 768px) {
      nav {
        position: absolute;
        top: 70px;
        left: 0;
        right: 0;
        background: black;
        flex-direction: column;
        align-items: center;
        display: none;
        padding: 20px 0;
        z-index: 1000;
      }

      nav.active {
        display: flex;
        animation: slideDown 0.3s ease forwards;
      }

      .menu-toggle {
        display: flex;
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .principal {
      text-align: center;
      padding: 60px 20px;
    }

    .principal img {
      width: 800px;
      max-width: 90%;
      border-radius: 12px;
      transition: transform 0.3s, opacity 0.3s;
      cursor: pointer;
    }

    .principal a:hover img {
      transform: scale(1.03);
      opacity: 0.7;
    }

    .hover-text {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      opacity: 0;
      transition: 0.3s;
      text-shadow: 0 0 10px black;
      pointer-events: none;
    }

    .principal a:hover .hover-text {
      opacity: 1;
    }

    footer {
      text-align: center;
      color: beige;
      padding: 30px 0;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <img src="images/auralogop.svg" alt="Logo Aura Estúdio">
    </div>

    <!-- Botão do menu hambúrguer -->
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Menu de navegação -->
    <nav id="menu">
      <a href="#projetos">Projetos</a>
      <a href="#bio">Bio</a>
      <a href="#contato">Contato</a>
    </nav>
  </header>

  <!-- Seção principal com imagem e texto em hover -->
  <div class="principal">
    <a href="pages/projetos.html">
      <img src="images/introimg.png" alt="Imagem principal">
      <span class="hover-text">Pode entrar.<br>Clique para ver os projetos</span>
    </a>
  </div>

  <!-- Rodapé -->
  <footer id="contato">
    <p>danielhrosa@email.com</p>
  </footer>

  <!-- Script do menu -->
  <script>
    const toggle = document.getElementById('menu-toggle'); // Botão hambúrguer
    const menu = document.getElementById('menu'); // Menu principal

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('active'); // Anima o botão
      menu.classList.toggle('active');   // Mostra ou esconde o menu
    });
  </script>
</body>

</html>
